<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🤖 JARVIS Driver Assistant | SmartSalai</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* ========== HEADER ========== */
        .header {
            background: rgba(20, 20, 50, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .header-title {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 28px;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 13px;
            animation: pulse 2s infinite;
        }
        
        .status-driving {
            background: rgba(0, 255, 100, 0.2);
            border: 2px solid #00ff64;
            color: #00ff64;
        }
        
        .status-standby {
            background: rgba(100, 150, 255, 0.2);
            border: 2px solid #6495ff;
            color: #6495ff;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        /* ========== GRID LAYOUT ========== */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* ========== PANELS ========== */
        .panel {
            background: rgba(20, 20, 50, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 150, 255, 0.2);
            border-radius: 15px;
            padding: 25px;
            transition: all 0.3s ease;
        }
        
        .panel:hover {
            border-color: rgba(100, 150, 255, 0.5);
            background: rgba(30, 30, 60, 0.7);
        }
        
        .panel-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #00d4ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* ========== VIDEO FEED ========== */
        .video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 2px solid rgba(0, 212, 255, 0.3);
        }
        
        .video-container img,
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* ========== GPS DISPLAY ========== */
        .gps-display {
            background: rgba(50, 50, 100, 0.4);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 10px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        
        .gps-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
        }
        
        .gps-label {
            color: #b0b0ff;
        }
        
        .gps-value {
            color: #00ff88;
            font-weight: bold;
        }
        
        /* ========== ALERTS PANEL ========== */
        .alerts-list {
            max-height: 600px;
            overflow-y: auto;
        }
        
        .alert-item {
            background: rgba(50, 50, 100, 0.5);
            border-left: 4px solid;
            border-radius: 5px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .alert-item.critical {
            border-left-color: #ff1744;
            background: rgba(255, 23, 68, 0.1);
        }
        
        .alert-item.warning {
            border-left-color: #ffb347;
            background: rgba(255, 179, 71, 0.1);
        }
        
        .alert-item.info {
            border-left-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }
        
        .alert-text {
            flex: 1;
        }
        
        .alert-type {
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 3px;
        }
        
        .alert-distance {
            font-size: 12px;
            opacity: 0.7;
        }
        
        /* ========== CONTROL BUTTONS ========== */
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .btn {
            flex: 1;
            min-width: 120px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            color: #000;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ff1744, #ff5722);
            color: #fff;
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 23, 68, 0.4);
        }
        
        .btn-secondary {
            background: rgba(100, 150, 255, 0.2);
            color: #00d4ff;
            border: 1px solid rgba(100, 150, 255, 0.5);
        }
        
        .btn-secondary:hover {
            background: rgba(100, 150, 255, 0.3);
            border-color: rgba(100, 150, 255, 0.8);
        }
        
        /* ========== STATS ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        
        .stat-card {
            background: rgba(50, 50, 100, 0.4);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #00ff88;
        }
        
        .stat-label {
            font-size: 12px;
            color: #b0b0ff;
            margin-top: 5px;
        }
        
        /* ========== VOICE INDICATOR ========== */
        .voice-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
        }
        
        .voice-icon {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00d4ff;
            animation: voice-pulse 1.5s infinite;
        }
        
        @keyframes voice-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        
        /* ========== SCROLLBAR ========== */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(50, 50, 100, 0.2);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.4);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 212, 255, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <div class="header-title">
                🤖 JARVIS Driver Assistant
            </div>
            <div id="statusBadge" class="status-badge status-standby">STANDBY</div>
        </div>
        
        <!-- MAIN CONTENT -->
        <div class="main-grid">
            <!-- LEFT COLUMN: VIDEO & GPS -->
            <div>
                <!-- VIDEO FEED -->
                <div class="panel">
                    <div class="panel-title">📹 Live Road Feed</div>
                    <div class="video-container">
                        <img src="http://192.168.31.184:8080/video" alt="Live Feed" style="display: block;">
                    </div>
                </div>
                
                <!-- GPS LOCATION -->
                <div class="panel">
                    <div class="panel-title">📍 GPS Location</div>
                    <div class="gps-display">
                        <div class="gps-row">
                            <span class="gps-label">Latitude:</span>
                            <span class="gps-value" id="gpsLat">0.0000°</span>
                        </div>
                        <div class="gps-row">
                            <span class="gps-label">Longitude:</span>
                            <span class="gps-value" id="gpsLon">0.0000°</span>
                        </div>
                        <div class="gps-row">
                            <span class="gps-label">Accuracy:</span>
                            <span class="gps-value" id="gpsAcc">-- m</span>
                        </div>
                        <div class="gps-row">
                            <span class="gps-label">Timestamp:</span>
                            <span class="gps-value" id="gpsTime">--:--:--</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- RIGHT COLUMN: ALERTS & CONTROLS -->
            <div>
                <!-- ACTIVE ALERTS -->
                <div class="panel" style="grid-column: 1 / -1;">
                    <div class="panel-title">⚠️ Real-Time Hazard Alerts</div>
                    <div class="alerts-list" id="alertsList">
                        <div style="text-align: center; color: #b0b0ff; padding: 30px;">
                            🟢 No hazards detected. Road is clear.
                        </div>
                    </div>
                </div>
                
                <!-- CONTROLS & STATS -->
                <div class="panel">
                    <div class="panel-title">🎮 Controls</div>
                    <div class="controls">
                        <button class="btn btn-primary" onclick="startDrive()">▶ Start Drive</button>
                        <button class="btn btn-danger" onclick="stopDrive()">⏹ Stop Drive</button>
                        <button class="btn btn-secondary" onclick="testAlert()">🧪 Test Alert</button>
                    </div>
                    
                    <div class="panel-title" style="margin-top: 20px;">📊 Statistics</div>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value" id="hazardCount">0</div>
                            <div class="stat-label">Hazards Detected</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="alertCount">0</div>
                            <div class="stat-label">Active Alerts</div>
                        </div>
                    </div>
                    
                    <div id="voiceStatus" class="voice-indicator" style="display: none;">
                        <div class="voice-icon"></div>
                        <span>🎙️ Voice Enabled</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = "http://localhost:8765";
        let isDriving = false;
        
        // Mock GPS data (in production, use device geolocation)
        const mockGPS = {
            lat: 28.6139,
            lon: 77.2090,
            accuracy: 10,
        };
        
        async function apiCall(endpoint, method = "GET", data = null) {
            try {
                const options = {
                    method,
                    headers: { "Content-Type": "application/json" }
                };
                if (data) options.body = JSON.stringify(data);
                
                const response = await fetch(`${API_BASE}${endpoint}`, options);
                return await response.json();
            } catch (e) {
                console.error(`API Error on ${endpoint}:`, e);
                return null;
            }
        }
        
        async function startDrive() {
            const result = await apiCall("/jarvis/start-drive", "POST");
            if (result) {
                isDriving = true;
                updateUI();
                console.log("✅ Drive started");
                
                // Show voice indicator if enabled
                if (result.voice_enabled) {
                    document.getElementById("voiceStatus").style.display = "flex";
                }
            }
        }
        
        async function stopDrive() {
            const result = await apiCall("/jarvis/stop-drive", "POST");
            if (result) {
                isDriving = false;
                updateUI();
                document.getElementById("voiceStatus").style.display = "none";
                console.log("✅ Drive stopped");
            }
        }
        
        async function updateGPS() {
            // In production, use device geolocation API
            mockGPS.lat += (Math.random() - 0.5) * 0.0001;
            mockGPS.lon += (Math.random() - 0.5) * 0.0001;
            
            await apiCall("/jarvis/update-gps", "POST", {
                lat: mockGPS.lat,
                lon: mockGPS.lon
            });
            
            document.getElementById("gpsLat").textContent = mockGPS.lat.toFixed(4) + "°";
            document.getElementById("gpsLon").textContent = mockGPS.lon.toFixed(4) + "°";
            document.getElementById("gpsAcc").textContent = mockGPS.accuracy + " m";
            document.getElementById("gpsTime").textContent = new Date().toLocaleTimeString();
        }
        
        async function updateAlerts() {
            const result = await apiCall("/jarvis/alerts");
            if (result && result.alerts) {
                const alertsList = document.getElementById("alertsList");
                
                if (result.alerts.length === 0) {
                    alertsList.innerHTML = `
                        <div style="text-align: center; color: #b0b0ff; padding: 30px;">
                            🟢 No hazards detected. Road is clear.
                        </div>
                    `;
                } else {
                    alertsList.innerHTML = result.alerts.map(alert => {
                        const priority = alert.info?.priority || 5;
                        const severity = priority >= 8 ? "critical" : priority >= 6 ? "warning" : "info";
                        return `
                            <div class="alert-item ${severity}">
                                <div class="alert-text">
                                    <div class="alert-type">${alert.type}</div>
                                    <div class="alert-distance">${alert.info?.alert || "Hazard detected"}</div>
                                </div>
                                <div style="text-align: right; font-size: 12px; color: #ffb347;">
                                    ${alert.distance_m ? Math.round(alert.distance_m) + "m" : "--"}
                                </div>
                            </div>
                        `;
                    }).join("");
                }
                
                document.getElementById("alertCount").textContent = result.count;
            }
        }
        
        async function testAlert() {
            const types = ["pothole", "speed_breach", "helmet_missing", "lane_violation"];
            const type = types[Math.floor(Math.random() * types.length)];
            
            await apiCall("/jarvis/detect-hazard", "POST", {
                hazard_type: type,
                lat: mockGPS.lat + (Math.random() - 0.5) * 0.001,
                lon: mockGPS.lon + (Math.random() - 0.5) * 0.001,
                confidence: 0.85 + Math.random() * 0.15,
                metadata: { distance_m: Math.random() * 500 }
            });
            
            await updateAlerts();
            console.log(`✅ Test alert: ${type}`);
        }
        
        function updateUI() {
            const badge = document.getElementById("statusBadge");
            if (isDriving) {
                badge.className = "status-badge status-driving";
                badge.textContent = "🚗 DRIVING";
            } else {
                badge.className = "status-badge status-standby";
                badge.textContent = "STANDBY";
            }
        }
        
        // Initialize
        async function init() {
            console.log("🤖 JARVIS Dashboard Initializing...");
            
            await updateGPS();
            await updateAlerts();
            
            // Poll updates every 2 seconds
            setInterval(() => {
                if (isDriving) {
                    updateGPS();
                    updateAlerts();
                }
            }, 2000);
        }
        
        // Start on load
        window.addEventListener("load", init);
    </script>
</body>
</html>
