name: CI — Basic Test Suite

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Basic tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run basic test suite
        env:
          VISION_MOCK_MODE: "1"       # force mock — no model weights in CI
          DASHCAM_SOURCE: "0"         # synthetic frames (no camera hardware)
        run: |
          python -m pytest \
            tests/test_agents.py \
            tests/test_core.py \
            tests/test_orchestrator.py \
            tests/test_dashcam_basic.py \
            -v --tb=short -q
