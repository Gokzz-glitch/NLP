name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  api-smoke:
    runs-on: ubuntu-latest
    env:
      API_USE_HTTPS: "false"
      API_REQUIRE_HTTPS_REDIRECT: "false"
      CSRF_SECRET_KEY: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
      DASHBOARD_SECRET_KEY: "bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb"
      INGEST_HMAC_SECRET: "cccccccccccccccccccccccccccccccc"
      FLEET_API_KEYS: "fleet-test-token"
      EDGE_SPATIAL_DB_PATH: "ci_edge_spatial.db"
      RAZORPAY_WEBHOOK_SECRET: "dddddddddddddddddddddddddddddddd"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.txt

      - name: Compile check
        run: python -m compileall api core etl agents

      - name: API tests
        run: python -m pytest -q /home/runner/work/NLP/NLP/tests/test_api_server.py
